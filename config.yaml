scraping:
  target_reviews: 1000
  batch_delay: 1.5
  timeout: 10
  search_query: "chair"

preprocessing:
  na_values:
    - "None"
    - "none"
    - "NA"
    - "N/A"
    - "n/a"
    - "null"
    - "NULL"
    - "-"
    - ""
  min_review_length: 10

sentiment_analysis:
  batch_size: 20
  max_tokens: 4000
  temperature: 0.3
  api_delay: 1.5

model:
  test_size: 0.2
  random_state: 42
  vectorizer_max_features: 5000

data_paths:
  raw: "data/raw/amazon_reviews.csv"
  cleaned: "data/processed/cleaned.csv"
  sentiment: "data/processed/sentiment_batched.csv"
  modeling: "data/processed/cleaned_modeling.csv"

model_paths:
  vectorizer: "models/tfidf_vectorizer.pkl"
  best_model: "models/best_model.pkl"
